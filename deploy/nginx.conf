worker_processes auto;

events { }

http {
    # 1) Подключаем стандартные маппинги расширений -> MIME-типы
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    resolver 127.0.0.11 valid=30s;

    server {
      listen 80;
      server_name _;
      return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name 194.87.147.48 localhost;


        ssl_certificate      /etc/nginx/ssl/selfsigned.crt;
        ssl_certificate_key  /etc/nginx/ssl/selfsigned.key;
        ssl_session_cache    shared:SSL:10m;
        ssl_session_timeout  10m;
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # 1) Статика
        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 30d;
            add_header Cache-Control "public";
        }

        # 2) Медиа
        location /media/ {
            alias /usr/share/nginx/html/media/;
            expires 30d;
            add_header Cache-Control "public";
        }

        location /lxdesk/ {
            # Адрес контейнера blender внутри сети Docker (имя сервиса:порт)
            proxy_pass http://lxdesk:3000/;

            # Заголовки для корректной работы
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Увеличиваем лимиты для тяжелого трафика Blender
            client_max_body_size 50M;
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;

            # Отключаем буферизацию (КРИТИЧНО для VNC)
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_set_header X-Accel-Buffering no;

            # WebSocket (Критично для управления мышкой/клавиатурой)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Чтобы обрывы связи не убивали сессию
            proxy_read_timeout 86400;

            # Разрешаем iframe
            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
        }

        # 3) Всё остальное проксируем на django
        location / {
            proxy_pass         http://web:8000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
