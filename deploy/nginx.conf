worker_processes auto;

events { }

http {
    # 1) Подключаем стандартные маппинги расширений -> MIME-типы
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    resolver 127.0.0.11 valid=30s;

    server {
      listen 80;
      server_name _;
      return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name 194.87.147.48 localhost;


        ssl_certificate      /etc/nginx/ssl/selfsigned.crt;
        ssl_certificate_key  /etc/nginx/ssl/selfsigned.key;
        ssl_session_cache    shared:SSL:10m;
        ssl_session_timeout  10m;
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # 1) Статика
        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 30d;
            add_header Cache-Control "public";
        }

        # 2) Медиа
        location /media/ {
            alias /usr/share/nginx/html/media/;
            expires 30d;
            add_header Cache-Control "public";
        }

        # Обновленный блок для Kasm
        # Регулярка теперь ловит IP (группа ip) и остаток пути
        # Регулярка теперь ловит имя: blender_user_1_abc123
        location ~ ^/kasm-session/(?<container_name>[a-zA-Z0-9_\-]+)/(?<path>.*)$ {
            resolver 127.0.0.11 valid=30s;
            set $upstream "$container_name:6901";

            # Обязательно сохраняем захваченный путь $path
            rewrite ^/kasm-session/[a-zA-Z0-9_\-]+/(.*)$ /$1 break;

            proxy_pass https://$upstream;

            # --- СТРОГО ЭТИ ЗАГОЛОВКИ ДЛЯ WEBSOCKET ---
            proxy_set_header Host $http_host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-KasmVNC-Path /kasm-session/$container_name;
            proxy_set_header X-Forwarded-Prefix /kasm-session/$container_name;

            # Авторизация (base64 kasm_user:password)
            proxy_set_header Authorization "Basic a2FzbV91c2VyOnBhc3N3b3Jk";

            # SSL настройки
            proxy_ssl_verify off;
            proxy_ssl_server_name off;

            # Отключение буферизации (важно для VNC)
            proxy_buffering off;
            proxy_read_timeout 86400;

            # Разрешаем iframe
            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
            add_header X-Frame-Options "SAMEORIGIN" always;
        }



        # 3) Всё остальное проксируем на django
        location / {
            proxy_pass         http://web:8000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
