worker_processes auto;

events { }

http {
    # 1) Подключаем стандартные маппинги расширений -> MIME-типы
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    resolver 127.0.0.11 valid=30s;

    server {
      listen 80;
      server_name _;
      return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name 194.87.214.67 localhost;


        ssl_certificate      /etc/nginx/ssl/selfsigned.crt;
        ssl_certificate_key  /etc/nginx/ssl/selfsigned.key;
        ssl_session_cache    shared:SSL:10m;
        ssl_session_timeout  10m;
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # 1) Статика
        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 30d;
            add_header Cache-Control "public";
        }

        # 2) Медиа
        location /media/ {
            alias /usr/share/nginx/html/media/;
            expires 30d;
            add_header Cache-Control "public";
        }

        location /lxdesk/ {
            proxy_pass http://lxdesk:3000/;

            # Подмена путей в ответе: добавляем префикс /lxdesk/ к ссылкам
            sub_filter_once off;
            sub_filter_types text/html text/css application/javascript;
            sub_filter 'src="/' 'src="/lxdesk/';
            sub_filter 'href="/' 'href="/lxdesk/';
            sub_filter 'url("/' 'url("/lxdesk/';
            sub_filter 'action="/' 'action="/lxdesk/';
            sub_filter '"assets/' '"lxdesk/assets/';
            sub_filter "'assets/" "'lxdesk/assets/";
            sub_filter '="/assets/' '="/lxdesk/assets/';
            sub_filter '="/vendor/' '="/lxdesk/vendor/';
            sub_filter '="/dist/' '="/lxdesk/dist/';
            sub_filter '="/app/' '="/lxdesk/app/';

            # Прокси-заголовки
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /lxdesk;

            # WebSocket
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Отключаем буферизацию
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_set_header X-Accel-Buffering no;
            proxy_read_timeout 86400;

            # Разрешаем iframe
            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
        }

        # 3) Всё остальное проксируем на django
        location / {
            proxy_pass         http://web:8000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
