<!-- templates/blender_workspace.html -->
{% extends 'base/base_header.html' %}
{% load static %}

{% block title %}СКБ КБ - Руководителю команды{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/index_style.css' %}">
{% endblock %}

{% block content_block_0 %}
<h1><a href="{% url 'main' %}">Web UI</a> -> Блендер</h1>
{% endblock %}

{% block content_block_1 %}
<div class="workspace-container" style="width: 100%; height: 80vh;">
    <button id="start-btn" class="btn btn-primary">Запустить Blender</button>

    <div id="kasm-frame" style="display: none; width: 100%; height: 100%;">
        <iframe id="blender-iframe"
                style="width: 100%; height: 100%; border: none;"
                allowfullscreen>
        </iframe>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<!-- Подключение Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
        crossorigin="anonymous">
</script>

<!-- Ваш код -->
<script>
    // Ждем, пока весь HTML загрузится
    document.addEventListener('DOMContentLoaded', function () {

        const btn = document.getElementById('start-btn');

        // Проверка на случай, если кнопки нет на странице
        if (btn) {
            btn.addEventListener('click', function () {
                const button = this;
                button.textContent = 'Загрузка контейнера...';
                button.disabled = true;

                fetch('/start-blender/', {
                    method: 'POST',
                    headers: {'X-CSRFToken': getCookie('csrftoken')}
                })
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === 'success') {
                            const iframe = document.getElementById('blender-iframe');
                            iframe.src = data.iframe_url;
                            document.getElementById('kasm-frame').style.display = 'block';
                            button.style.display = 'none';
                        } else {
                            alert('Ошибка: ' + data.message);
                            button.textContent = 'Запустить Blender';
                            button.disabled = false;
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        alert('Ошибка соединения');
                        button.textContent = 'Запустить Blender';
                        button.disabled = false;
                    });
            });
        }
    });

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
</script>
{% endblock %}
